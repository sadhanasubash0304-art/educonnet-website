<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduConnect - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-center text-blue-600">EduConnect</h2>
    <p class="text-center text-slate-500 mt-2">Sign in to your account</p>

    <form class="mt-6 space-y-4">
      <input type="email" placeholder="Email"
        class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">

      <input type="password" placeholder="Password"
        class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">

      <a href="dashboard.html"
   class="w-full block text-center bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
   Login
</a>
    </form>

    <div class="mt-6 text-center text-slate-500">OR</div>

    <div class="mt-4 space-y-3">
      <button class="w-full border py-2 rounded-xl hover:bg-slate-100">
        Continue with Google
      </button>
      <button class="w-full border py-2 rounded-xl hover:bg-slate-100">
        Continue with Facebook
      </button>
    </div>

    <p class="mt-6 text-center text-sm">
      Don't have an account?
      <a href="#" class="text-blue-600 font-semibold">Sign Up</a>
    </p>
  </div>

</body>
</html>
