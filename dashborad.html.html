<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduConnect - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

  <!-- Navbar -->
  <nav class="bg-white shadow px-8 py-4 flex justify-between">
    <h1 class="text-xl font-bold text-blue-600">EduConnect</h1>
    <div class="space-x-4">
      <a href="dashboard.html" class="hover:text-blue-600">Dashboard</a>
      <a href="connections.html" class="hover:text-blue-600">Connections</a>
      <a href="index.html" class="hover:text-blue-600">Logout</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto mt-10 grid md:grid-cols-3 gap-6 px-6">

    <!-- Profile Card -->
    <div class="bg-white p-6 rounded-2xl shadow-md">
      <img src="https://via.placeholder.com/100"
        class="rounded-full mx-auto">
      <h2 class="text-center text-xl font-semibold mt-4">John Doe</h2>
      <p class="text-center text-slate-500">Computer Science Student</p>

      <div class="mt-4 text-sm text-slate-600">
        <p><strong>University:</strong> ABC University</p>
        <p><strong>Year:</strong> 3rd Year</p>
        <p><strong>Location:</strong> New York</p>
      </div>
    </div>

    <!-- Skills & Interests -->
    <div class="bg-white p-6 rounded-2xl shadow-md">
      <h3 class="text-lg font-semibold mb-4">Skills & Interests</h3>
      <div class="flex flex-wrap gap-2">
        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm">JavaScript</span>
        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm">AI</span>
        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm">Web Development</span>
        <span class="px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-sm">Research</span>
      </div>
    </div>

    <!-- Achievements -->
    <div class="bg-white p-6 rounded-2xl shadow-md">
      <h3 class="text-lg font-semibold mb-4">Achievements & Badges</h3>
      <ul class="space-y-2 text-slate-600">
        <li>🏆 Top Contributor</li>
        <li>🎓 Academic Excellence</li>
        <li>🤝 Community Mentor</li>
      </ul>
    </div>

  </div>

</body>
</html>
