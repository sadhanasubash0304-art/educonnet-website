<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduConnect - Connections</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

  <div class="max-w-4xl mx-auto mt-10 px-6">

    <h2 class="text-3xl font-bold mb-6">My Connections</h2>

    <div class="space-y-4">

      <!-- Connection Card -->
      <div class="bg-white p-4 rounded-2xl shadow-md flex justify-between items-center">
        <div class="flex items-center gap-4">
          <img src="https://via.placeholder.com/50" class="rounded-full">
          <div>
            <h3 class="font-semibold">Sarah M.</h3>
            <p class="text-sm text-slate-500">Engineering Student</p>
          </div>
        </div>
        <button class="px-4 py-2 bg-red-100 text-red-600 rounded-xl">
          Remove
        </button>
      </div>

      <!-- Connection Request -->
      <div class="bg-white p-4 rounded-2xl shadow-md flex justify-between items-center">
        <div class="flex items-center gap-4">
          <img src="https://via.placeholder.com/50" class="rounded-full">
          <div>
            <h3 class="font-semibold">David L.</h3>
            <p class="text-sm text-slate-500">Research Scholar</p>
          </div>
        </div>
        <div class="space-x-2">
          <button class="px-4 py-2 bg-green-100 text-green-600 rounded-xl">
            Accept
          </button>
          <button class="px-4 py-2 bg-red-100 text-red-600 rounded-xl">
            Decline
          </button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
